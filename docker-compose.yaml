version: '3.8'

services:
  # --- BROKER MQTT ---
  mosquitto:
    image: eclipse-mosquitto:latest
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf

  # --- REDIS (Cola de Tareas y Caché) ---
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  # --- POSTGRESQL (MAESTRO) ---
  postgres-master:
    image: bitnami/postgresql:latest
    environment:
      - POSTGRESQL_REPLICATION_MODE=master
      - POSTGRESQL_REPLICATION_USER=repl_user
      - POSTGRESQL_REPLICATION_PASSWORD=repl_pass
      - POSTGRESQL_USERNAME=c5_user
      - POSTGRESQL_PASSWORD=c5_pass
      - POSTGRESQL_DATABASE=c5_db
    ports:
      - "5432:5432"

  # --- POSTGRESQL (RÉPLICA) ---
  postgres-replica:
    image: bitnami/postgresql:latest
    environment:
      - POSTGRESQL_REPLICATION_MODE=slave
      - POSTGRESQL_REPLICATION_USER=repl_user
      - POSTGRESQL_REPLICATION_PASSWORD=repl_pass
      - POSTGRESQL_MASTER_HOST=postgres-master
      - POSTGRESQL_USERNAME=c5_user
      - POSTGRESQL_PASSWORD=c5_pass
      - POSTGRESQL_DATABASE=c5_db
    ports:
      - "5433:5432"
    depends_on:
      - postgres-master

  # --- MICROSERVICIOS ---
  geolocation:
    build: ./services/geolocation
    ports:
      - "50052:50052"

  reception1:
    build: ./services/reception
    environment: &reception_env
      - REDIS_HOST=redis
      - MQTT_BROKER=mosquitto
      - PRIORITY_HOST=priority:50051
      - GEOLOCATION_HOST=geolocation:50052
      - PYTHONUNBUFFERED=1
    volumes:
      - ./media_alerts:/app/media

  reception2:
    build: ./services/reception
    environment: *reception_env
    volumes:
      - ./media_alerts:/app/media

  reception3:
    build: ./services/reception
    environment: *reception_env
    volumes:
      - ./media_alerts:/app/media

  priority:
    build: ./services/priority
    environment:
      - DB_MASTER=postgresql://c5_user:c5_pass@postgres-master:5432/c5_db
      - REGLAS_PATH=/app/shared/reglas.json
      - PYTHONUNBUFFERED=1
    depends_on:
      - postgres-master
    volumes:
      # Se monta el directorio completo para asegurar la propagación de eventos del sistema de archivos
      - ./shared_rules:/app/shared

  notification:
    build: ./services/notification
    environment:
      - REDIS_HOST=redis
      - PYTHONUNBUFFERED=1
    ports:
      - "8001:8001"

  history:
    build: ./services/history
    ports:
      - "8000:8000"
    environment:
      - DB_MASTER=postgresql://c5_user:c5_pass@postgres-master:5432/c5_db
      - DB_REPLICA=postgresql://c5_user:c5_pass@postgres-replica:5432/c5_db
      - REGLAS_PATH=/app/shared/reglas.json
      - PYTHONUNBUFFERED=1
    depends_on:
      - postgres-master
      - postgres-replica
      - redis
    volumes:
      - ./media_alerts:/app/media
      # Ambos contenedores comparten el acceso directo a la misma carpeta montada en caliente
      - ./shared_rules:/app/shared

  # --- NGINX + FRONTEND (Gateway Principal) ---
  gateway:
    build: 
      context: ./DASHBOARD-ALERTAS
      dockerfile: Dockerfile
    ports:
      - "8090:80"
    volumes:
      # Se sobrescribe la configuración por defecto de Nginx con la tuya
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - reception1
      - reception2
      - reception3
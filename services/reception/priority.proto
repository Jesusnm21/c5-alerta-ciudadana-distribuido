syntax = "proto3";

package priority;

service PriorityClassifier {
    rpc ClassifyAlert (AlertRequest) returns (PriorityResponse);
}

message AlertRequest {
    string device_id = 1;
    string emergency_type = 2;
    string transcription = 3;  
}

message PriorityResponse {
    string priority_level = 1;
    string matched_rule = 2;   
    string response_unit = 3;
}